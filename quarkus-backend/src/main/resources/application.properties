# Quarkus Configuration

# HTTP Port
quarkus.http.port=8091

# OIDC Configuration
quarkus.oidc.auth-server-url=http://localhost:8080/realms/demo-realm
quarkus.oidc.client-id=quarkus-service
# Bearer-only client doesn't need a secret if it just validates tokens from the issuer
quarkus.oidc.application-type=service

# CORS for Angular Frontend
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,OPTIONS,HEAD,DELETE,PUT
quarkus.http.cors.headers=accept, authorization, content-type, x-requested-with

# Map Keycloak roles to Quarkus roles
quarkus.oidc.roles.role-claim-path=realm_access/roles
