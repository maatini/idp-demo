<main class="container">
  <div class="header">
    <h1>IDP Demo</h1>
    <span class="badge">Angular 20 + Quarkus</span>
  </div>

  @if (isLoggedIn()) {
    <div class="card">
      <h2>Hallo, {{ username() }}!</h2>
      <p>Status: Erfolgreich authentifiziert ✅</p>
      
      <div class="actions">
        <button (click)="callBackend()" [disabled]="loading()">
          {{ loading() ? 'Lade...' : 'Geschützten Endpoint aufrufen' }}
        </button>
        <button (click)="logout()" class="btn-secondary">Logout</button>
      </div>

      @if (backendResponse()) {
        <div class="response-box">
          <h3>Backend Antwort:</h3>
          <pre>{{ backendResponse() | json }}</pre>
        </div>
      }
    </div>
  } @else {
    <div class="card error-card">
      <h2>Nicht angemeldet ❌</h2>
      <p>Es liegt kein gültiges Token vor. Bitte melde dich an.</p>
      <div class="actions">
        <button (click)="login()">Login mit Keycloak starten</button>
      </div>
    </div>
  }
</main>
